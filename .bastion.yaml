# Bastion reviewers for Mite.
#
# Backend: Codex (the `codex` CLI) running on a ChatGPT subscription, model
# gpt-5.5 at high reasoning effort. The Codex backend passes the model as `-m`
# and the effort as `-c model_reasoning_effort=...`. `defaults` only carries
# `model` and `effort`; an inherited model needs a pinned backend, so every
# reviewer pins `backend: codex`.
#
# Modes: `gate` blocks merge on a `block` verdict and fails closed on
# timeout/crash; `advisor` only comments and never blocks. Reviewers that
# enforce a hard repo rule are gates; reviewers that ask for human judgement or
# out-of-band evidence (benchmarks, doc updates) are advisors.
#
# See AGENTS.md for the rules these encode and docs/ for the source-of-truth
# documents each reviewer points back to.

defaults:
  model: gpt-5.5
  effort: high

reviewers:
  # --- Disclosure and prose hygiene -------------------------------------------

  - name: private-eval-ip-disclosure
    trigger:
      - "**/*.md"
      - "site/**"
      - "PRODUCT.md"
      - "README.md"
      - "THIRD_PARTY_NOTICES.md"
      - ".github/**"
    mode: gate
    backend: codex
    prompt: |
      Mite is built against a PRIVATE eval corpus that may contain third-party
      IP. Public-facing artifacts (docs, the marketing site, README, PRODUCT.md,
      THIRD_PARTY_NOTICES.md, CI workflow text, PR-visible files) must never leak
      IP-bearing details from that corpus.

      Block the PR if any changed public-facing file introduces:
        - a private corpus name, collection directory name, or capture directory
          name (for example anything shaped like a real game, visual novel,
          product, studio, or source title used as eval data);
        - text, character names, place names, or screenshots transcribed from a
          real capture;
        - demo or sample content in site/src/data/sentences.ts (or anywhere on
          the site) that is not original, neutral, textbook-style example text.
          Every Japanese demo string must be original and not copied from any
          third-party work or real capture.

      Use neutral terms like "private eval corpus" when describing validation.
      Aggregate counts, accuracy percentages, and pass/fail status are fine.

      If none of the above appear, approve. Do not block on ordinary product or
      technical wording. See the "Private Eval Disclosure" section of AGENTS.md.

  - name: prose-hygiene
    trigger:
      - "**/*.md"
      - "site/**"
      - "src/**/*.rs"
      - "app/src/**"
      - "app/src-tauri/src/**"
    mode: gate
    backend: codex
    prompt: |
      Enforce this repository's prose conventions on changed text: documentation,
      markdown, site copy, code comments, and any generated/user-facing strings.

      Block the PR if newly added or modified prose contains:
        - an em dash or en dash. These are banned in all prose. The correct fix
          is to recast with the punctuation that fits the join (parentheses for
          an aside, a colon to introduce or expand, a comma for a loose pause, or
          two sentences). A spaced hyphen or en dash is NOT an acceptable
          substitute. The only exception is genuinely external or quoted material
          (third-party content, cited text), where original punctuation stands.
        - non-ASCII "smart" quotes or apostrophes in docs, code comments, or
          generated text (curly quotes, typographic apostrophes). Use plain ASCII
          quotes.

      Name each offending file and line. If the changed prose is clean, approve.
      Do not block on style preferences beyond these two concrete rules.

  # --- Rust runtime correctness -----------------------------------------------

  - name: rust-error-boundaries
    trigger:
      - "src/**/*.rs"
      - "app/src-tauri/src/**/*.rs"
    mode: gate
    backend: codex
    prompt: |
      Mite is a long-running overlay over live capture, OCR, and GPU inference.
      A panic in the runtime path kills the user's session. Review the changeset
      for runtime error-handling discipline in NON-TEST code.

      Block the PR if newly added or modified runtime code:
        - calls .unwrap(), .expect(), panic!, unreachable!, or indexes a slice in
          a way that can panic on a recoverable or external condition (capture
          failures, OCR/ONNX Runtime errors, missing model/runtime files, IO,
          window enumeration, config parsing, parsing of external data);
        - swallows an error in a way that hides a failure the user needs to see,
          or converts a recoverable error into a process abort.

      Allowances: .unwrap()/.expect() on a genuinely-infallible invariant with a
      clear justification, in tests, in examples/, in build.rs, or in one-time
      startup where aborting is the intended behavior. Lock poisoning and
      static/const initialization are acceptable expect() sites.

      Name the file and line and say what external condition triggers the panic.
      If runtime error handling is sound, approve. This encodes "harden runtime
      error boundaries" from AGENTS.md.

  # --- Lookup core architecture -----------------------------------------------

  - name: lookup-core-portability
    trigger:
      - "src/dictionary/**"
      - "src/morphology.rs"
      - "src/frequency.rs"
      - "src/pos.rs"
      - "src/script.rs"
      - "src/text_blocks.rs"
      - "src/text_corrections.rs"
      - "src/geometry.rs"
      - "src/hover/**"
    mode: gate
    backend: codex
    prompt: |
      The Japanese lookup core (dictionary segmentation, morphology, frequency,
      part-of-speech, hover hit-testing and popup content, geometry, scoring)
      must stay runnable WITHOUT a live window or GPU, and stay easy to unit
      test. Win32 and GPU-specific code belong at the edges, not here.

      Block the PR if changes in these modules:
        - introduce a dependency on Win32, GPU/ONNX Runtime, live capture, or a
          running overlay into the lookup core (this makes the core untestable
          off-Windows and off-GPU);
        - add non-trivial geometry, segmentation, scoring, or popup-content logic
          with NO accompanying unit test, when the behavior is a pure function
          that could be tested directly;
        - hand-roll Japanese morphology or deinflection that Lindera or JMdict
          data already expresses, instead of using the existing data path.

      If the change keeps the core pure, portable, and tested, approve. Small
      mechanical edits do not require new tests. See the Development Rules in
      AGENTS.md.

  # --- Overlay presentation ---------------------------------------------------

  - name: overlay-accessibility
    trigger:
      - "src/win32_overlay/**"
      - "src/hover/**"
      - "src/hud/**"
    mode: gate
    backend: codex
    prompt: |
      Mite's overlay is a reading aid and an "invisible precision instrument".
      Its palette and popups must stay accessible. Consult PRODUCT.md and
      src/win32_overlay/style.rs for the intended palette and design anchors.

      Block the PR if overlay/popup changes:
        - introduce category or part-of-speech colors that are not colorblind
          safe (do not rely on red/green contrast alone to carry meaning), or
          confine product hues outside their intended product-demo/overlay
          context;
        - reduce popup/HUD text contrast or legibility below the high-contrast
          reading-support bar PRODUCT.md sets;
        - hardcode palette values that should come from the shared style/token
          source instead of being duplicated.

      If presentation changes preserve colorblind safety and high-contrast
      legibility, approve. This encodes "Make overlay category colors
      colorblind-safe" and the PRODUCT.md accessibility anchors.

  # --- Hygiene: committed artifacts -------------------------------------------

  - name: committed-artifacts
    trigger:
      - "**"
    mode: gate
    backend: codex
    prompt: |
      Mite keeps local and runtime artifacts out of the repository. Review newly
      ADDED files in the changeset for things that should never be committed.

      Block the PR if it adds:
        - files under models/, cache/, target/, .gpu-runtime/, .venv-models/, or
          a local mite.toml or .env;
        - model weights, ONNX files, captured frames/screenshots, or other large
          binary runtime outputs;
        - NVIDIA / CUDA / cuDNN / TensorRT binaries or installers (Mite never
          hosts, bundles, or installs these);
        - secrets, API keys, tokens, or credential files;
        - stray debugging or scratch artifacts (for example a file literally
          named like a redirected device such as "nul"/"dev/null", editor swap
          files, or one-off dumps).

      Documentation, source, tests, fixtures intended to be tracked, and small
      committed assets are fine. If nothing inappropriate is added, approve. See
      "Local Artifacts" in AGENTS.md.

  # --- Advisors: human judgement / out-of-band evidence -----------------------

  - name: latency-tail-evidence
    trigger:
      - "src/ocr.rs"
      - "src/ort_engine/**"
      - "src/capture/**"
      - "src/wgc_capture.rs"
      - "src/interactive/**"
      - "src/models.rs"
    mode: advisor
    backend: codex
    prompt: |
      This change touches the live latency path (capture, OCR, ONNX Runtime,
      smoothing, or timing). Mite's quality bar is TAIL latency (p95/p99), not
      averages, and accuracy must not silently regress.

      As an advisor (do not block), flag for the author when a change in these
      modules:
        - plausibly affects per-frame latency or throughput but the PR gives no
          p95/p99 before/after evidence as docs/performance.md expects;
        - could change OCR output or accuracy without eval-corpus evidence that
          results are unchanged (or an explained, justified delta);
        - adds work to the steady-state / stable-scene fast path that previous
          work specifically optimized to skip (BGRA->RGB conversion, full-frame
          allocation, fingerprinting, copying the 4K buffer).

      If the change is latency-neutral or already carries evidence, say so
      briefly. Point to docs/performance.md for the expected evidence shape.

  - name: docs-and-config-sync
    trigger:
      - "src/cli.rs"
      - "src/config.rs"
      - "src/models.rs"
      - "src/doctor.rs"
      - "model-manifest.json"
    mode: gate
    backend: codex
    prompt: |
      Command behavior, config defaults, model requirements, and runtime
      diagnostics are documented in README.md and docs/. They drift easily, and
      stale docs mislead users, so this is a gate.

      Block the PR if a change:
        - adds, removes, or renames a CLI command/flag, or changes its behavior,
          without a matching update to README.md or the relevant docs/ page;
        - changes a config default, schema field, or validation boundary without
          updating docs, or adds boundary/guard logic outside config.rs that
          would be better centralized there;
        - changes model requirements, the model manifest, or doctor's checks in a
          way that makes the docs or doctor output stale or no longer honest.

      Only block on a real, user-visible drift between the change and the docs; a
      pure refactor that keeps behavior, defaults, and output identical is not a
      violation. If docs and config stay in sync, approve. See the "Update docs"
      rule and the config.rs guidance in AGENTS.md.
