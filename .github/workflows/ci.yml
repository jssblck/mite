name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  app:
    name: App
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install frontend dependencies
        working-directory: app
        run: bun install --frozen-lockfile

      # The app's Win32 backend embeds the built frontend via
      # `tauri::generate_context!`, which reads `frontendDist` (app/dist). Build
      # it first so `cargo clippy`/`cargo test` can compile the crate without a
      # full `tauri build`.
      - name: Build frontend
        working-directory: app
        run: bun run build

      - name: Check formatting
        working-directory: app/src-tauri
        run: cargo fmt --all -- --check

      - name: Run tests
        working-directory: app/src-tauri
        run: cargo test

      - name: Run clippy
        working-directory: app/src-tauri
        run: cargo clippy --all-targets -- -D warnings
