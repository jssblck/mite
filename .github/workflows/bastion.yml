name: bastion

# Bastion reviews for Mite. On every same-repo pull request this downloads a
# published `bastion` release binary and runs `bastion review` over the
# changeset. A blocked gate exits non-zero and fails the job; make the
# `bastion review` check required in branch protection to stop the merge.
#
# The reviewer engine is a published release of jssblck/bastion, not a binary
# built from this PR. That is deliberate: building the engine from the PR would
# let a change edit the very engine that judges it. The job always adopts the
# latest published release, so engine improvements land with no per-PR pin bump.
# Reviewer policy (.bastion.yaml) is read from the checkout so prompt and trigger
# changes take effect in the same PR; keep .bastion.yaml and this workflow
# CODEOWNERS-protected.
#
# Reviews run on the Codex CLI billed to the PR author's own ChatGPT
# subscription (model gpt-5.5, high effort). See
# https://bastion.jessica.black/guide/continuous-integration.md and the engine's
# docs/developer-guide/github-adapter.md.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# The report step writes the PR comment (pull-requests: write) and the per
# reviewer and aggregate check runs (checks: write). The aggregate `bastion`
# check is what branch protection requires.
permissions:
  contents: read
  pull-requests: write
  checks: write

# One in-flight review per PR; a new push cancels the previous run.
concurrency:
  group: bastion-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    name: bastion review
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # True only when both dedicated-app secrets are set (the id and the private
    # key are one credential), so a half-configured repo falls back instead of
    # failing the mint step. Computed here because the mint step's `if:` can read
    # `env` but not `secrets`.
    env:
      HAS_BASTION_APP: ${{ secrets.BASTION_APP_ID != '' && secrets.BASTION_APP_PRIVATE_KEY != '' }}
    # The Codex (ChatGPT) credentials live in an Actions secret, and GitHub does not
    # share secrets with fork-PR runs. We also will not run an agentic backend
    # over untrusted code, so this runs for same-repo PRs only. A maintainer
    # reviews a fork PR by pushing its branch to a trusted branch in this repo.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history so the base branch resolves for the changeset diff and
          # the reviewer can run `git diff <base>` over the working tree.
          fetch-depth: 0

      - name: Install the bastion release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The engine lives in jssblck/bastion, not this repo. `gh release view`
          # with no tag resolves GitHub's "latest" (most recent non-draft, non
          # prerelease), so the engine auto-advances but never adopts an -rc build.
          engine_repo="jssblck/bastion"
          version="$(gh release view --repo "$engine_repo" --json tagName -q .tagName)"
          echo "Using bastion engine: $version"
          echo "BASTION_ENGINE_VERSION=$version" >> "$GITHUB_ENV"
          asset="bastion-x86_64-unknown-linux-gnu.tar.gz"
          dest="$RUNNER_TEMP/bastion"
          mkdir -p "$dest"
          gh release download "$version" \
            --repo "$engine_repo" \
            --pattern "$asset" \
            --dir "$dest"
          tar -xzf "$dest/$asset" -C "$dest"
          # The archive extracts to a directory named after the asset stem.
          echo "$dest/${asset%.tar.gz}" >> "$GITHUB_PATH"

      - name: Verify bastion
        run: bastion --version

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install the Codex CLI
        run: |
          set -euo pipefail
          npm install -g @openai/codex
          codex --version

      - name: Authenticate Codex as the PR author
        env:
          # Bastion bills each PR's reviews to its author's own ChatGPT
          # subscription through the Codex CLI. The author's GitHub login maps to
          # a CODEX_AUTH_<LOGIN> secret holding the contents of that person's
          # ~/.codex/auth.json (the ChatGPT-subscription OAuth credential, with
          # auth_mode "chatgpt" plus access and refresh tokens). Codex refreshes
          # the access token from the stored refresh token at run time. To onboard
          # a contributor, capture their auth.json locally (`codex login`, then
          # ~/.codex/auth.json), add it as CODEX_AUTH_<THEIR_LOGIN_UPPERCASED>,
          # and add a `case` arm below. The mapping lives in this
          # CODEOWNERS-protected workflow, so changing who may spend a
          # subscription is itself a reviewed change. An unmapped author fails
          # closed (the gate blocks) rather than silently billing someone else.
          #
          # Dependabot opens same-repo PRs but has no subscription of its own, so
          # its arm points at a maintainer who has opted in to sponsor it. Two
          # GitHub specifics: the login is literally `dependabot[bot]` (the
          # brackets are a glob class in a shell `case`, so the arm quotes them),
          # and GitHub serves secrets to Dependabot runs from a separate
          # Dependabot secret store, so CODEX_AUTH_JSSBLCK must also be set there
          # (`gh secret set CODEX_AUTH_JSSBLCK --app dependabot`) or it arrives
          # empty and the gate blocks with a "mapped but empty" error.
          AUTHOR: ${{ github.event.pull_request.user.login }}
          CODEX_AUTH_JSSBLCK: ${{ secrets.CODEX_AUTH_JSSBLCK }}
        run: |
          set -euo pipefail
          author="$(printf '%s' "$AUTHOR" | tr '[:upper:]' '[:lower:]')"
          case "$author" in
            jssblck) cred="$CODEX_AUTH_JSSBLCK" ;;
            'dependabot[bot]') cred="$CODEX_AUTH_JSSBLCK" ;;
            *)
              echo "::error::No Codex subscription is mapped for PR author '$AUTHOR'. Add a CODEX_AUTH_<LOGIN> secret and a case arm in .github/workflows/bastion.yml." >&2
              exit 1
              ;;
          esac
          if [ -z "$cred" ]; then
            echo "::error::Codex credential for '$AUTHOR' is mapped but its secret is empty; set the matching CODEX_AUTH_<LOGIN> repository secret." >&2
            exit 1
          fi
          mkdir -p "$HOME/.codex"
          printf '%s' "$cred" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - name: Run bastion review
        env:
          # Keep run history inside the workspace so it can be uploaded as an
          # artifact instead of landing in the runner's per-user data directory.
          BASTION_DATA_DIR: ${{ github.workspace }}/.bastion
          # Resolve the `codex` binary npm just put on PATH.
          BASTION_CODEX_BIN: codex
        # GitHub bash runs with `-eo pipefail`, so a blocked review's non-zero
        # exit fails the job (and the required check). The canonical JSONL is
        # persisted under BASTION_DATA_DIR and uploaded below.
        run: bastion review --base "origin/${{ github.base_ref }}"

      - name: Mint a dedicated app token for reporting
        id: app-token
        # Optional, only when a dedicated Bastion GitHub App is configured. It
        # gives the posted check runs their own named check suite. Without it the
        # report step falls back to the default GITHUB_TOKEN, which still posts.
        # Runs on always() so reporting works even when the review blocked.
        if: ${{ always() && env.HAS_BASTION_APP == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BASTION_APP_ID }}
          private-key: ${{ secrets.BASTION_APP_PRIVATE_KEY }}

      - name: Report the review to the pull request
        # Runs even when the review blocked (and so failed the job), so the PR
        # always gets the sticky comment and the per-reviewer checks. Creating
        # check runs needs a GitHub App installation token (a classic PAT cannot);
        # both the minted dedicated-app token and the default GITHUB_TOKEN
        # qualify. If the installed engine predates `github report`, the step
        # prints a notice and exits 0.
        if: always()
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token || github.token }}
          BASTION_DATA_DIR: ${{ github.workspace }}/.bastion
        run: |
          set -euo pipefail
          if ! bastion github report --help >/dev/null 2>&1; then
            echo "::notice::bastion engine ${BASTION_ENGINE_VERSION:-unknown} has no 'github report'; skipping PR comment and checks until the latest release includes it."
            exit 0
          fi
          bastion github report \
            --repo "${{ github.repository }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --sha "${{ github.event.pull_request.head.sha }}"

      - name: Upload the run
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bastion-run
          path: ${{ github.workspace }}/.bastion/runs/**
          if-no-files-found: warn
